<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6a4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b4226;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3e1f0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kilnBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b5562a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a3010;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="smokeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#a8d8b0;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#a8d8b0;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="pelletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5E3C" />
      <stop offset="100%" style="stop-color:#5C3317" />
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <clipPath id="roundedClip">
      <rect rx="16" ry="16" width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Background sky -->
  <rect width="1200" height="630" fill="url(#sky)" clip-path="url(#roundedClip)"/>

  <!-- Subtle grid/field lines in background -->
  <g opacity="0.06">
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="480" width="1200" height="150" fill="url(#groundGrad)" clip-path="url(#roundedClip)"/>

  <!-- Ground detail lines -->
  <line x1="0" y1="490" x2="1200" y2="490" stroke="#8B5E3C" stroke-width="1" opacity="0.4"/>

  <!-- === BRICK KILN LEFT === -->
  <!-- Kiln chimney -->
  <rect x="130" y="200" width="60" height="260" fill="url(#kilnBody)" filter="url(#softShadow)"/>
  <!-- Chimney bricks detail -->
  <g opacity="0.25">
    <line x1="130" y1="220" x2="190" y2="220" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="240" x2="190" y2="240" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="260" x2="190" y2="260" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="280" x2="190" y2="280" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="300" x2="190" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="320" x2="190" y2="320" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="340" x2="190" y2="340" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="360" x2="190" y2="360" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="380" x2="190" y2="380" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="400" x2="190" y2="400" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="420" x2="190" y2="420" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="440" x2="190" y2="440" stroke="#000" stroke-width="1"/>
    <line x1="130" y1="460" x2="190" y2="460" stroke="#000" stroke-width="1"/>
    <line x1="160" y1="210" x2="160" y2="460" stroke="#000" stroke-width="1"/>
  </g>
  <!-- Kiln cap -->
  <rect x="118" y="192" width="84" height="16" rx="4" fill="#c76b35"/>

  <!-- Smoke from left kiln (green/clean) -->
  <ellipse cx="160" cy="180" rx="18" ry="30" fill="url(#smokeGrad)" opacity="0.8"/>
  <ellipse cx="148" cy="150" rx="14" ry="24" fill="url(#smokeGrad)" opacity="0.6"/>
  <ellipse cx="168" cy="120" rx="12" ry="20" fill="url(#smokeGrad)" opacity="0.4"/>

  <!-- Kiln dome/base -->
  <ellipse cx="160" cy="460" rx="120" ry="22" fill="#7a3010" opacity="0.7"/>
  <rect x="60" y="420" width="200" height="60" rx="6" fill="#7a3010"/>

  <!-- === SECOND KILN (right side) === -->
  <rect x="960" y="230" width="55" height="230" fill="url(#kilnBody)" filter="url(#softShadow)"/>
  <rect x="948" y="222" width="79" height="14" rx="4" fill="#c76b35"/>
  <ellipse cx="987" cy="455" rx="110" ry="20" fill="#7a3010" opacity="0.7"/>
  <rect x="895" y="420" width="185" height="55" rx="6" fill="#7a3010"/>
  <!-- Smoke right kiln -->
  <ellipse cx="987" cy="210" rx="16" ry="26" fill="url(#smokeGrad)" opacity="0.7"/>
  <ellipse cx="977" cy="184" rx="12" ry="20" fill="url(#smokeGrad)" opacity="0.5"/>

  <!-- === BIOMASS PELLETS PILE (center-left) === -->
  <ellipse cx="380" cy="490" rx="100" ry="22" fill="#3e1f0a" opacity="0.5"/>
  <!-- Pellet pile -->
  <g filter="url(#softShadow)">
    <!-- Row 1 (bottom) -->
    <ellipse cx="320" cy="488" rx="14" ry="7" fill="url(#pelletGrad)"/>
    <ellipse cx="348" cy="488" rx="14" ry="7" fill="url(#pelletGrad)"/>
    <ellipse cx="376" cy="488" rx="14" ry="7" fill="url(#pelletGrad)"/>
    <ellipse cx="404" cy="488" rx="14" ry="7" fill="url(#pelletGrad)"/>
    <ellipse cx="432" cy="488" rx="14" ry="7" fill="url(#pelletGrad)"/>
    <!-- Row 2 -->
    <ellipse cx="334" cy="474" rx="14" ry="7" fill="#7a4520"/>
    <ellipse cx="362" cy="474" rx="14" ry="7" fill="#7a4520"/>
    <ellipse cx="390" cy="474" rx="14" ry="7" fill="#7a4520"/>
    <ellipse cx="418" cy="474" rx="14" ry="7" fill="#7a4520"/>
    <!-- Row 3 -->
    <ellipse cx="348" cy="460" rx="14" ry="7" fill="url(#pelletGrad)"/>
    <ellipse cx="376" cy="460" rx="14" ry="7" fill="url(#pelletGrad)"/>
    <ellipse cx="404" cy="460" rx="14" ry="7" fill="url(#pelletGrad)"/>
    <!-- Row 4 -->
    <ellipse cx="362" cy="447" rx="14" ry="7" fill="#7a4520"/>
    <ellipse cx="390" cy="447" rx="14" ry="7" fill="#7a4520"/>
    <!-- Top -->
    <ellipse cx="376" cy="434" rx="14" ry="7" fill="url(#pelletGrad)"/>
  </g>
  <!-- Label under pile -->
  <text x="376" y="518" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c8e6c9" opacity="0.85" letter-spacing="1">BIOMASS PELLETS</text>

  <!-- === LEAF/PLANT ICONS === -->
  <g opacity="0.7" transform="translate(600, 160)">
    <path d="M0,60 C-30,-20 -80,-40 -40,-80 C0,-120 60,-60 0,60Z" fill="#52b788"/>
    <path d="M0,60 C30,-20 80,-40 40,-80 C0,-120 -60,-60 0,60Z" fill="#40916c"/>
    <line x1="0" y1="60" x2="0" y2="-70" stroke="#2d6a4f" stroke-width="2.5"/>
    <line x1="0" y1="10" x2="-30" y2="-20" stroke="#2d6a4f" stroke-width="1.5"/>
    <line x1="0" y1="-10" x2="28" y2="-40" stroke="#2d6a4f" stroke-width="1.5"/>
  </g>

  <!-- === ARROW from pellets to kiln === -->
  <g opacity="0.6">
    <path d="M490,470 C540,440 560,430 590,430" stroke="#a8d8b0" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
    <polygon points="590,424 602,430 590,436" fill="#a8d8b0"/>
  </g>

  <!-- === MAIN TEXT OVERLAY === -->
  <!-- Dark overlay band -->
  <rect x="0" y="0" width="1200" height="630" fill="#000" opacity="0.22" clip-path="url(#roundedClip)"/>

  <!-- Main headline -->
  <text x="600" y="95" text-anchor="middle" font-family="'Segoe UI', Georgia, serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="1" filter="url(#softShadow)">Brick Kilns &amp; Biomass Pellets</text>

  <!-- Sub headline -->
  <text x="600" y="148" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#b7e4c7" letter-spacing="3" font-weight="400">INDIA'S INDUSTRIAL ENERGY TRANSITION</text>

  <!-- Decorative line -->
  <line x1="440" y1="168" x2="760" y2="168" stroke="#52b788" stroke-width="2" opacity="0.8"/>

  <!-- Bottom tag -->
  <rect x="460" y="560" width="280" height="40" rx="20" fill="#2d6a4f" opacity="0.85"/>
  <text x="600" y="586" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" letter-spacing="2">KANOZ BIO ENERGY</text>

  <!-- Stats bubbles -->
  <g transform="translate(730, 340)">
    <circle cx="0" cy="0" r="60" fill="#1b4332" opacity="0.85"/>
    <text x="0" y="-12" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#b7e4c7">30%</text>
    <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#95d5b2">Cost</text>
    <text x="0" y="26" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#95d5b2">Savings</text>
  </g>

  <g transform="translate(850, 380)">
    <circle cx="0" cy="0" r="50" fill="#1b4332" opacity="0.85"/>
    <text x="0" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#b7e4c7">Low</text>
    <text x="0" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#95d5b2">SO₂</text>
    <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#95d5b2">Emissions</text>
  </g>
</svg>
